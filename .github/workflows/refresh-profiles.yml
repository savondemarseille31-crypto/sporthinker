name: Refresh player profiles

on:
  schedule:
    # Tous les lundis à 04h00 UTC (avant le début de semaine de tournois)
    - cron: '0 4 * * 1'
  workflow_dispatch:
    # Déclenchement manuel depuis GitHub Actions (onglet Actions → Run workflow)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute player profiles
        run: python3 scripts/compute-player-profiles.py

      - name: Commit & push si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/player-profiles.json
          if git diff --staged --quiet; then
            echo "Aucun changement détecté — skip commit"
          else
            git commit -m "chore: refresh player profiles [$(date +%Y-%m-%d)]"
            git push
          fi
